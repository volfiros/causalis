# Render Blueprint for Causalis
# Deploy both backend and frontend with one click:
# https://dashboard.render.com/blueprint

services:
  # Backend: FastAPI API server
  - type: web
    name: causalis-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.provider:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: FRONTEND_URL
        value: https://causalis-frontend.onrender.com
    healthCheckPath: /health

  # Frontend: Next.js web service (requires Node.js for API rewrites)
  - type: web
    name: causalis-frontend
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: BACKEND_URL
        value: https://causalis-backend.onrender.com
      - key: NODE_VERSION
        value: 20
